name: Obsidian review lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  npm-eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install with npm (Obsidian scanner compatibility)
        run: npm ci

      - name: Lint like Obsidian community review
        run: npm run lint:obsidian-scan

      - name: Lint plugin CSS (shipped bundle)
        run: npm run lint:css

      - name: Build like Obsidian community review
        run: npm run build
